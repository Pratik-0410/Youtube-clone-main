apiVersion: apps/v1
kind: Deployment

metadata:
  name: youtube-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: youtube

  template:
    metadata:
      labels:
        app: youtube

    spec:
      containers:
        - name: youtube-container
          image: youtube-clone-app
          imagePullPolicy: Never

          ports:
            - containerPort: 3000

---

apiVersion: v1
kind: Service

metadata:
  name: youtube-service

spec:
  type: NodePort

  selector:
    app: youtube

  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30007
